openapi: 3.0.3
info:
  title: OCRWebApp Phase 0 API
  version: 0.3.0
  description: |
    Phase 0 API契約。
    対象: documents作成、jobs状態参照、document参照、properties編集・エクスポート。
servers:
  - url: https://example.com
tags:
  - name: documents
  - name: jobs
  - name: properties
paths:
  /api/documents:
    post:
      tags:
        - documents
      summary: 文書アップロードとジョブ作成
      description: ファイルを保存し、documents/jobs(queued)を作成する。OCR/LLMは同期実行しない。
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: jpg/png/pdf, max 20MB
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDocumentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: ファイルサイズ上限超過
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "415":
          description: 非対応のファイル形式
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/jobs/{jobId}:
    get:
      tags:
        - jobs
      summary: ジョブ状態取得
      security:
        - sessionAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/properties/{propertyId}/export:
    get:
      tags:
        - properties
      summary: 正規化データをCSV/PDF形式でエクスポート
      security:
        - sessionAuth: []
      parameters:
        - name: propertyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [csv, pdf]
      responses:
        "200":
          description: ダウンロード成功
          content:
            text/csv:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 所有者以外のアクセス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/documents/{documentId}:
    get:
      tags:
        - documents
      summary: 文書メタデータ取得
      security:
        - sessionAuth: []
      parameters:
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: 所有者以外のアクセス
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
  schemas:
    CreateDocumentResponse:
      type: object
      required:
        - document_id
        - job_id
        - status
      properties:
        document_id:
          type: string
          format: uuid
        job_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"
    JobStatusResponse:
      type: object
      required:
        - job_id
        - document_id
        - status
      properties:
        job_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/JobStatus"
        error_message:
          type: string
          nullable: true
    DocumentResponse:
      type: object
      required:
        - id
        - user_id
        - file_path
        - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        file_path:
          type: string
        created_at:
          type: string
          format: date-time
    JobStatus:
      type: string
      enum:
        - queued
        - processing
        - succeeded
        - failed
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
  responses:
    BadRequest:
      description: 入力不正
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未認証
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 対象なし
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
